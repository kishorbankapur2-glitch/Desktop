<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Windows 11 Launcher</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Win11 Launcher">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      background: #0a0a1a;
    }

    /* Main container that handles rotation */
    .rotate-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      will-change: transform;
    }

    /* Landscape rotation */
    .rotate-container.landscape {
      transform: rotate(90deg) translateY(-100%);
      transform-origin: top left;
      width: 100vh;
      height: 100vw;
    }

    /* Content wrapper */
    .app-content {
      width: 100%;
      height: 100%;
      position: relative;
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
      background-attachment: fixed !important;
    }

    /* Fix background for rotated state */
    .rotate-container.landscape .app-content {
      background-attachment: scroll !important;
    }

    /* Desktop grid */
    #desktop {
      height: calc(100% - 70px);
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
      gap: 12px;
      align-content: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      position: relative;
      z-index: 1;
    }

    #desktop::-webkit-scrollbar {
      width: 5px;
      background: transparent;
    }
    #desktop::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }

    .app-icon {
      width: 85px;
      height: 95px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-size: 11px;
      border-radius: 12px;
      cursor: pointer;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
      transition: all 0.2s ease;
      background: transparent;
      border: none;
      flex-shrink: 0;
    }

    .app-icon:hover, .app-icon:active {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      transform: scale(1.02);
    }

    .app-icon img {
      width: 44px;
      height: 44px;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .emoji-icon {
      font-size: 40px;
      margin-bottom: 6px;
    }

    /* START MENU */
    #start-menu {
      position: fixed;
      bottom: -700px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 540px;
      height: 520px;
      background: rgba(245, 245, 245, 0.96);
      backdrop-filter: blur(32px);
      border-radius: 24px;
      padding: 20px;
      transition: bottom 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 10000;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.4);
    }

    #start-menu.active {
      bottom: 80px;
    }

    /* Rotated start menu */
    .rotate-container.landscape #start-menu {
      position: fixed;
      bottom: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 650px;
      height: auto;
      max-height: 80vh;
    }

    .rotate-container.landscape #start-menu.active {
      bottom: auto;
      top: 50%;
    }

    .search-box {
      width: 100%;
      padding: 12px 18px;
      border-radius: 30px;
      border: none;
      background: rgba(0,0,0,0.05);
      margin-bottom: 20px;
      outline: none;
      font-size: 15px;
      font-weight: 500;
    }
    .search-box:focus {
      background: white;
      box-shadow: 0 0 0 2px #0078d4;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      overflow-y: auto;
      max-height: 380px;
      padding-right: 5px;
    }

    .rotate-container.landscape .menu-grid {
      grid-template-columns: repeat(5, 1fr) !important;
    }

    @media (max-width: 500px) {
      .menu-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .menu-grid::-webkit-scrollbar {
      width: 4px;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
      text-decoration: none;
      color: #1e1e1e;
      padding: 10px 6px;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.15s;
      background: transparent;
      font-weight: 500;
    }
    .menu-item:hover, .menu-item:active {
      background: rgba(0, 0, 0, 0.08);
    }
    .menu-item img {
      width: 38px;
      height: 38px;
      margin-bottom: 6px;
    }
    .menu-emoji {
      font-size: 34px;
      margin-bottom: 5px;
    }

    /* Taskbar */
    #taskbar-container {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10001;
      pointer-events: none;
    }

    #taskbar {
      width: 96%;
      max-width: 620px;
      height: 58px;
      background: rgba(30, 30, 35, 0.85);
      backdrop-filter: blur(28px);
      border-radius: 28px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: auto;
    }

    /* Rotated taskbar - moves to side */
    .rotate-container.landscape #taskbar-container {
      bottom: auto;
      top: 50%;
      left: auto;
      right: 12px;
      transform: translateY(-50%);
      width: auto;
    }

    .rotate-container.landscape #taskbar {
      width: 58px;
      height: auto;
      flex-direction: column;
      padding: 12px 0;
      gap: 12px;
    }

    .rotate-container.landscape #tray {
      margin-left: 0;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .tb-btn {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 18px;
      transition: 0.15s;
    }
    .tb-btn:hover, .tb-btn:active {
      background: rgba(255,255,255,0.2);
    }
    .tb-btn img {
      width: 28px;
      height: 28px;
    }
    
    /* Rotation button */
    .rotate-btn {
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      padding: 6px 10px;
      border-radius: 40px;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .rotate-btn:hover, .rotate-btn:active {
      background: rgba(255,255,255,0.2);
    }
    
    #tray {
      margin-left: auto;
      display: flex;
      gap: 12px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px black;
      background: rgba(0,0,0,0.2);
      padding: 6px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      align-items: center;
    }
    
    /* Install banner */
    .install-prompt {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #202020e6;
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 60px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      gap: 18px;
      z-index: 10002;
      border: 1px solid rgba(255,255,255,0.3);
      pointer-events: auto;
      white-space: nowrap;
    }

    .rotate-container.landscape .install-prompt {
      bottom: auto;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .install-prompt button {
      background: #0078d4;
      border: none;
      color: white;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    .install-prompt button:last-child {
      background: rgba(255,255,255,0.2);
    }
    .hide-install {
      display: none;
    }

    /* Animation for rotation button */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .rotate-btn:active {
      animation: pulse 0.3s ease;
    }
  </style>
</head>
<body>
<div class="rotate-container">
  <div class="app-content" id="appContent">
    <!-- Desktop Icons Area -->
    <div id="desktop">
      <a href="intent://#Intent;package=com.android.chrome;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Chrome">
        <span>Chrome</span>
      </a>
      <a href="intent://#Intent;package=com.whatsapp;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <span>WhatsApp</span>
      </a>
      <a href="intent://#Intent;package=com.google.android.youtube;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
        <span>YouTube</span>
      </a>
      <div class="app-icon" data-minecraft>
        <div class="emoji-icon">🪏</div>
        <span>Minecraft</span>
      </div>
      <a href="intent://#Intent;package=com.instagram.android;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
        <span>Instagram</span>
      </a>
      <a href="intent://#Intent;package=com.facebook.katana;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB">
        <span>Facebook</span>
      </a>
      <a href="intent://#Intent;package=org.telegram.messenger;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
        <span>Telegram</span>
      </a>
      <a href="intent://#Intent;package=com.spotify.music;end" class="app-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png" alt="Spotify">
        <span>Spotify</span>
      </a>
    </div>

    <!-- START MENU -->
    <div id="start-menu">
      <input type="text" class="search-box" placeholder="Search apps...">
      <div class="menu-grid">
        <a href="intent://#Intent;package=com.whatsapp;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
          <span>WhatsApp</span>
        </a>
        <a href="intent://#Intent;package=com.instagram.android;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
          <span>Instagram</span>
        </a>
        <a href="intent://#Intent;package=com.facebook.katana;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
          <span>Facebook</span>
        </a>
        <a href="intent://#Intent;package=org.telegram.messenger;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
          <span>Telegram</span>
        </a>
        <a href="intent://#Intent;package=com.android.chrome;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png">
          <span>Chrome</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.youtube;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
          <span>YouTube</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.gm;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
          <span>Gmail</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.apps.maps;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
          <span>Maps</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.apps.photos;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/685/685686.png">
          <span>Photos</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.calculator;end" class="menu-item">
          <img src="https://img.icons8.com/fluency/96/calculator.png">
          <span>Calculator</span>
        </a>
        <a href="intent://#Intent;package=com.google.android.deskclock;end" class="menu-item">
          <img src="https://cdn-icons-png.flaticon.com/512/2972/2972531.png">
          <span>Clock</span>
        </a>
        <div class="menu-item" data-minecraft-menu>
          <div class="menu-emoji">🪏</div>
          <span>Minecraft</span>
        </div>
        <div class="menu-item" id="wallpaper-menu-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png">
          <span>Wallpaper</span>
          <input type="file" id="wp-input" accept="image/*" style="display:none;">
        </div>
      </div>
    </div>

    <!-- Taskbar with Rotation Button -->
    <div id="taskbar-container">
      <div id="taskbar">
        <div id="start-btn" class="tb-btn">
          <img src="https://img.icons8.com/color/48/windows-11.png" alt="start">
        </div>
        <div id="tray">
          <div id="rotate-btn" class="rotate-btn" style="cursor: pointer;">
            🔄 <span id="rotate-icon">↻</span>
          </div>
          <span id="batt">🔋 --%</span>
          <span id="clock">--:--</span>
        </div>
      </div>
    </div>

    <!-- Install banner -->
    <div id="installBanner" class="install-prompt hide-install">
      <span>📱 Install Windows 11 Launcher</span>
      <button id="installBtn">Install</button>
      <button id="dismissInstall">Later</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- ORIENTATION CONTROL - FULL ROTATION ----------
    const rotateContainer = document.querySelector('.rotate-container');
    const rotateBtn = document.getElementById('rotate-btn');
    const rotateIcon = document.getElementById('rotate-icon');
    let isLandscape = false;
    
    function applyRotation() {
      if (isLandscape) {
        rotateContainer.classList.add('landscape');
        rotateIcon.innerHTML = '📱';
        // Show hint
        showToast('Landscape mode • Tap again to return');
      } else {
        rotateContainer.classList.remove('landscape');
        rotateIcon.innerHTML = '↻';
        showToast('Portrait mode');
      }
    }
    
    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.position = 'fixed';
      toast.style.bottom = '100px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = 'rgba(0,0,0,0.85)';
      toast.style.color = 'white';
      toast.style.padding = '10px 20px';
      toast.style.borderRadius = '25px';
      toast.style.fontSize = '13px';
      toast.style.zIndex = '10003';
      toast.style.pointerEvents = 'none';
      toast.style.whiteSpace = 'nowrap';
      toast.style.fontWeight = '500';
      toast.style.backdropFilter = 'blur(10px)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
    }
    
    function toggleRotation() {
      isLandscape = !isLandscape;
      applyRotation();
      // Close menu when rotating for better UX
      document.getElementById('start-menu').classList.remove('active');
    }
    
    rotateBtn.addEventListener('click', toggleRotation);
    
    // ---------- START MENU ----------
    const startBtn = document.getElementById('start-btn');
    const menuPanel = document.getElementById('start-menu');
    function closeMenu() { menuPanel.classList.remove('active'); }
    function toggleMenu(e) {
      e.stopPropagation();
      menuPanel.classList.toggle('active');
    }
    startBtn.addEventListener('click', toggleMenu);
    document.addEventListener('click', function(event) {
      if (!menuPanel.contains(event.target) && event.target !== startBtn && !startBtn.contains(event.target)) {
        closeMenu();
      }
    });
    menuPanel.addEventListener('click', (e) => e.stopPropagation());

    // ---------- SEARCH FILTER ----------
    const searchBox = document.querySelector('.search-box');
    const menuItems = document.querySelectorAll('.menu-item');
    searchBox.addEventListener('input', () => {
      const val = searchBox.value.toLowerCase().trim();
      menuItems.forEach(item => {
        const text = item.innerText.toLowerCase();
        if (text.includes(val)) {
          item.style.display = "flex";
        } else {
          item.style.display = "none";
        }
      });
    });

    // ---------- WALLPAPER (with full rotation support) ----------
    const wallpaperBtn = document.getElementById('wallpaper-menu-btn');
    const wpInput = document.getElementById('wp-input');
    const appContent = document.getElementById('appContent');
    
    function setWallpaper(imageUrl) {
      appContent.style.backgroundImage = `url('${imageUrl}')`;
      appContent.style.backgroundSize = 'cover';
      appContent.style.backgroundPosition = 'center center';
      appContent.style.backgroundRepeat = 'no-repeat';
    }
    
    if (wallpaperBtn) {
      wallpaperBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        wpInput.click();
      });
    }
    
    wpInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const imgUrl = ev.target.result;
          localStorage.setItem('win11-wallpaper', imgUrl);
          setWallpaper(imgUrl);
          showToast('Wallpaper changed!');
        };
        reader.readAsDataURL(file);
      }
    });
    
    const savedWallpaper = localStorage.getItem('win11-wallpaper');
    if (savedWallpaper) {
      setWallpaper(savedWallpaper);
    } else {
      setWallpaper('https://images.unsplash.com/photo-1579373903781-fd5c0c30c4cd?q=80&w=1920&auto=format');
    }

    // ---------- CLOCK ----------
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock').innerText = timeStr;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ---------- BATTERY ----------
    async function updateBattery() {
      if (navigator.getBattery) {
        try {
          const battery = await navigator.getBattery();
          function setBatteryLevel() {
            const percent = Math.round(battery.level * 100);
            const icon = percent > 20 ? "🔋" : "🪫";
            document.getElementById('batt').innerHTML = `${icon} ${percent}%`;
          }
          setBatteryLevel();
          battery.addEventListener('levelchange', setBatteryLevel);
          battery.addEventListener('chargingchange', setBatteryLevel);
        } catch(e) {
          document.getElementById('batt').innerHTML = "🔋 ?%";
        }
      } else {
        document.getElementById('batt').innerHTML = "🔋 94%";
      }
    }
    updateBattery();

    // ---------- MINECRAFT INTENT ----------
    const minecraftDesktop = document.querySelector('[data-minecraft]');
    const minecraftMenuItem = document.querySelector('[data-minecraft-menu]');
    const minecraftIntent = "intent://#Intent;package=com.mojang.minecraftpe;end";
    function launchMinecraft() {
      window.location.href = minecraftIntent;
    }
    if (minecraftDesktop) minecraftDesktop.addEventListener('click', (e) => {
      e.preventDefault();
      launchMinecraft();
    });
    if (minecraftMenuItem) minecraftMenuItem.addEventListener('click', (e) => {
      e.preventDefault();
      launchMinecraft();
    });

    // ---------- PWA INSTALL ----------
    let deferredPrompt = null;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');
    const dismissBtn = document.getElementById('dismissInstall');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.classList.remove('hide-install');
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBanner.classList.add('hide-install');
      } else {
        alert("Tap browser menu → Add to Home screen");
        installBanner.classList.add('hide-install');
      }
    });
    dismissBtn.addEventListener('click', () => {
      installBanner.classList.add('hide-install');
    });

    window.addEventListener('appinstalled', () => {
      installBanner.classList.add('hide-install');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
    }
    
    document.querySelectorAll('.app-icon, .menu-item, .tb-btn').forEach(el => {
      el.addEventListener('contextmenu', (e) => e.preventDefault());
    });
    
    wpInput.addEventListener('click', (e) => e.stopPropagation());
  })();
</script>
</body>
</html>
